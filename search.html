<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JULIA — Поиск</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg0:#1E1340; --bg1:#0F0A1E; --text:#E9E3FF; --muted:#9A8FC4; --dim:#6B5E93; --border:rgba(192,132,252,.16); }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(130% 90% at 50% -15%, #2A1A5C 0%, var(--bg0) 38%, var(--bg1) 100%);
      background-attachment: fixed; color: var(--text); min-height: 100vh; padding: 26px 22px 80px;
    }
    .wrap { width: 100%; max-width: 1080px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .wordmark { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; letter-spacing: .16em; font-size: 22px;
      background: linear-gradient(96deg,#F0ABFC,#C084FC 48%,#FB7185); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
    .back { color: var(--muted); font-size: 13.5px; text-decoration: none; } .back:hover { color: var(--text); }

    .qbar { display: flex; align-items: center; gap: 12px; padding: 15px 22px; border-radius: 14px;
      background: rgba(255,255,255,.045); border: 1px solid rgba(192,132,252,.28); margin-bottom: 30px; }
    .qbar .q-text { flex: 1; font-size: 16.5px; font-weight: 600; }
    .qbar .edit { color: var(--muted); font-size: 13px; cursor: pointer; } .qbar .edit:hover { color: var(--text); }

    .grid { display: grid; grid-template-columns: 1fr 340px; gap: 34px; align-items: start; }
    @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } .sidebar { order: 2; } }

    h2.sec { font-size: 13px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); margin-bottom: 14px; }
    .answer-card { background: rgba(255,255,255,.025); border: 1px solid var(--border); border-radius: 16px; padding: 26px 28px; }
    .answer-prose { font-size: 16.5px; line-height: 1.75; }
    .answer-prose p { margin-bottom: 13px; } .answer-prose p:last-child { margin-bottom: 0; }
    .cite { color: #C084FC; text-decoration: none; font-weight: 700; font-size: 12px; vertical-align: super; padding: 0 1px; }
    .cite:hover { text-decoration: underline; }
    .c-link { color: #F0ABFC; text-decoration: none; font-weight: 600; border-bottom: 1px dashed rgba(240,171,252,.4); }
    .c-link:hover { border-bottom-style: solid; }
    .thinking { color: var(--muted); font-size: 15px; } .thinking::after { content: '▍'; animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .err { color: #FCA5A5; font-size: 14.5px; }

    .block { margin-top: 34px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
    .c-card { display: flex; flex-direction: column; gap: 10px; padding: 16px 18px; border-radius: 14px;
      background: rgba(255,255,255,.025); border: 1px solid var(--border); text-decoration: none; color: var(--text); transition: border-color .15s, transform .15s; }
    .c-card:hover { border-color: rgba(192,132,252,.4); transform: translateY(-2px); }
    .c-name { font-size: 15px; font-weight: 700; }
    .pill { display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
    .pill i { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
    .rel { display: flex; flex-direction: column; gap: 10px; }
    .rel a { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 15px 18px; border-radius: 12px;
      background: rgba(255,255,255,.025); border: 1px solid var(--border); text-decoration: none; color: var(--text); font-size: 14.5px; font-weight: 500; transition: border-color .15s; }
    .rel a:hover { border-color: rgba(192,132,252,.4); } .rel a .arr { color: var(--muted); }

    .sidebar h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .sidebar .cnt { color: var(--dim); font-weight: 500; font-size: 13px; }
    .src { padding: 15px 0; border-bottom: 1px solid rgba(192,132,252,.08); } .src:last-child { border-bottom: 0; }
    .src-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }
    .src-top .num { width: 19px; height: 19px; border-radius: 50%; background: rgba(192,132,252,.18); color: #C084FC;
      display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .src-name { font-family: 'Space Grotesk', monospace; font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .src-date { font-family: 'Space Grotesk', monospace; font-size: 11.5px; color: var(--dim); margin-left: auto; }
    .src-title { display: block; font-size: 14px; font-weight: 600; color: var(--text); text-decoration: none; line-height: 1.35; }
    a.src-title:hover { color: #C084FC; }
    .src-snip { margin-top: 6px; font-size: 12.5px; color: var(--muted); line-height: 1.45; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <span class="wordmark" onclick="window.location.href='/'">JULIA</span>
      <a class="back" href="/">← На главную</a>
    </div>
    <div class="qbar">
      <span>🔍</span>
      <span class="q-text" id="q-text"></span>
      <span class="edit" onclick="window.location.href='/'">↻ изменить</span>
    </div>
    <div class="grid">
      <div class="main">
        <h2 class="sec">Ответ</h2>
        <div class="answer-card"><div id="answer"></div></div>
        <div class="block" id="concepts-block" hidden>
          <h2 class="sec">Концепты в ответе</h2>
          <div class="cards" id="concepts"></div>
        </div>
        <div class="block" id="related-block" hidden>
          <h2 class="sec">Похожие вопросы</h2>
          <div class="rel" id="related"></div>
        </div>
      </div>
      <aside class="sidebar" id="sidebar"></aside>
    </div>
  </div>
  <script type="module" src="/src/search.js"></script>
</body>
</html>
