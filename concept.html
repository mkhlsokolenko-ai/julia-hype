  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg0:#1E1340; --bg1:#0F0A1E; --text:#E9E3FF; --muted:#9A8FC4; --dim:#6B5E93; --border:rgba(192,132,252,.14); }
    html, body { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: radial-gradient(120% 80% at 50% -10%, #2A1A5C 0%, var(--bg0) 35%, var(--bg1) 100%);
      background-attachment: fixed;
      color: var(--text); min-height: 100vh; padding: 28px 20px 80px;
    }
    .wrap { width: 100%; max-width: 880px; margin: 0 auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .wordmark { font-weight: 800; letter-spacing: .18em; font-size: 20px;
      background: linear-gradient(92deg,#F0ABFC,#C084FC 48%,#FB7185); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
    .back { color: var(--muted); font-size: 13.5px; cursor: pointer; text-decoration: none; }
    .back:hover { color: var(--text); }
    .glass { background: rgba(255,255,255,.025); border: 1px solid var(--border); border-radius: 18px;
      box-shadow: 0 30px 80px -45px rgba(192,132,252,.45); }

    /* hero */
    .hero h1 { font-size: 40px; font-weight: 800; letter-spacing: -1px; line-height: 1.05; margin-bottom: 16px; }
    .phase-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
    .phase-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; padding: 8px 18px; border-radius: 999px; }
    .phase-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
    .velo { color: var(--muted); font-size: 14px; }
    .velo b { color: var(--text); }
    .desc { color: var(--muted); font-size: 16px; line-height: 1.6; }
    .verdict { display: flex; gap: 10px; align-items: flex-start; margin: 16px 0 0; padding: 12px 16px; border-radius: 14px;
      background: rgba(192,132,252,.08); background: color-mix(in srgb, var(--vc) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--vc) 38%, transparent); }
    .verdict-ic { font-size: 16px; line-height: 1.5; flex: none; }
    .verdict-t { color: var(--text); font-size: 15.5px; line-height: 1.5; }

    /* section */
    .section { margin-top: 40px; }
    .section-h { font-size: 20px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-h .em { background: linear-gradient(92deg,#F0ABFC,#C084FC); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* signal rows */
    .signal-card { padding: 22px 26px; }
    .sig-row { display: grid; grid-template-columns: 18px 1fr 160px 90px; align-items: center; gap: 14px; padding: 11px 0; border-bottom: 1px solid rgba(192,132,252,.08); }
    .sig-row:last-child { border-bottom: 0; }
    .sig-row .bullet { font-size: 17px; }
    .sig-row .lbl { font-size: 14px; font-weight: 600; }
    .sig-row .lbl .state { color: var(--muted); font-size: 12.5px; font-weight: 500; margin-left: 6px; }
    .sig-row .bar { height: 7px; border-radius: 6px; background: rgba(255,255,255,.07); overflow: hidden; }
    .sig-row .bar > div { height: 100%; border-radius: 6px; box-shadow: 0 0 12px currentColor; }
    .sig-row .val { text-align: right; font-size: 14px; font-weight: 700; }
    .evidence { margin-top: 16px; font-size: 13px; color: var(--dim); }
    .evidence b { color: var(--muted); }

    /* adoption */
    .adopt-card { padding: 22px 26px; }
    .adopt-head { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; margin-bottom: 18px; }
    .stage-badge { font-size: 13px; font-weight: 700; padding: 6px 14px; border-radius: 999px; letter-spacing: .03em; }
    .composite { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 220px; }
    .composite-l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .composite-bar { flex: 1; height: 7px; border-radius: 6px; background: rgba(255,255,255,.07); overflow: hidden; }
    .composite-bar > div { height: 100%; border-radius: 6px; box-shadow: 0 0 12px currentColor; }
    .composite-val { font-size: 15px; font-weight: 700; }
    .adopt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 12px; }
    .stat { background: rgba(255,255,255,.03); border: 1px solid rgba(192,132,252,.1); border-radius: 12px; padding: 12px 14px; position: relative; }
    .stat-v { font-size: 18px; font-weight: 700; }
    .stat-l { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
    .stat-vel { position: absolute; top: 10px; right: 12px; font-size: 11px; font-weight: 600; }
    .adopt-empty { color: var(--dim); font-size: 13px; }
    .adopt-meta { margin-top: 14px; font-size: 12px; color: var(--dim); }

    /* phase journey */
    .tl-card { padding: 30px 26px; }
    .tl-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; flex-wrap: wrap; }
    .tl-step { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 64px; }
    .tl-month { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
    .tl-dot { width: 14px; height: 14px; border-radius: 50%; }
    .tl-step.current .tl-dot { transform: scale(1.35); }
    .tl-phase { font-size: 12px; font-weight: 600; text-align: center; white-space: nowrap; }
    .tl-conn { flex: 1; height: 2px; min-width: 14px; background: rgba(192,132,252,.22); margin-top: 30px; }

    /* family tree + related */
    .ft-card { padding: 22px 26px; display: flex; flex-direction: column; gap: 20px; }
    .ft-lbl { font-size: 12px; color: var(--dim); letter-spacing: .16em; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
    .ft-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ft-children { display: flex; flex-direction: column; gap: 8px; }
    .ln-node { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 12px; background: rgba(255,255,255,.03); border: 1px solid rgba(192,132,252,.12); text-decoration: none; color: var(--text); transition: border-color .15s, background .15s; }
    .ln-node:hover { border-color: rgba(192,132,252,.4); background: rgba(192,132,252,.08); }
    .ln-tier { width: 8px; height: 8px; border-radius: 50%; }
    .ln-name { font-size: 13.5px; font-weight: 600; }
    .ln-phase { font-size: 11.5px; }
    .ft-arrow { color: var(--dim); font-size: 16px; }
    .ft-self { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 12px; background: rgba(192,132,252,.14); border: 1px solid rgba(192,132,252,.35); font-size: 13.5px; font-weight: 700; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
    .rc-card { display: flex; flex-direction: column; gap: 10px; padding: 16px 18px; border-radius: 14px; background: rgba(255,255,255,.025); border: 1px solid var(--border); text-decoration: none; color: var(--text); transition: border-color .15s, transform .15s; }
    .rc-card:hover { border-color: rgba(192,132,252,.4); transform: translateY(-2px); }
    .rc-name { font-size: 15px; font-weight: 700; }
    .rc-pill { display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px; }
    .rc-dot { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }

    .loading, .error { color: var(--muted); font-size: 15px; text-align: center; padding: 80px 20px; line-height: 1.6; }
    .error b { color: #FCA5A5; }

    .spark-card { padding: 18px 20px; }
    .spark-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .spark { width: 100%; height: auto; display: block; }
    .spark-stats { display: flex; gap: 28px; margin-top: 12px; }
    .spark-stats > div { display: flex; flex-direction: column; gap: 1px; }
    .sp-num { font-family: 'Space Grotesk', monospace; font-size: 20px; font-weight: 600; color: var(--text); }
    .sp-lbl { font-size: 11.5px; color: var(--muted); }

    .ask-card { padding: 18px 20px; }
    .ask-row { display: flex; gap: 10px; }
    #ask-input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 15px; outline: none; }
    #ask-input:focus { border-color: rgba(192,132,252,.5); }
    #ask-input::placeholder { color: var(--dim); }
    #ask-send { width: 46px; flex: none; border: 0; border-radius: 12px; cursor: pointer; font-size: 18px; color: #160E2E; background: linear-gradient(135deg,#F0ABFC,#C084FC); }
    #ask-send:hover { filter: brightness(1.08); }
    .ask-suggest { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .ask-suggest button { background: rgba(255,255,255,.03); border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 6px 12px; font-family: inherit; font-size: 12.5px; cursor: pointer; }
    .ask-suggest button:hover { border-color: rgba(192,132,252,.45); color: var(--text); }
    .ask-answer { margin-top: 16px; }
    .ask-answer .answer-prose p { font-size: 15px; line-height: 1.65; color: var(--text); margin: 0 0 12px; }
    .ask-answer .answer-prose p:last-child { margin-bottom: 0; }
    .ask-answer .cite { color: var(--dim); font-size: 11px; }
    .ask-answer .c-link { color: #C084FC; text-decoration: none; border-bottom: 1px dashed rgba(192,132,252,.4); }
    .ask-src { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
    .ask-src-h { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .asrc { display: flex; gap: 8px; align-items: baseline; font-size: 13px; margin-bottom: 6px; }
    .asrc .anum { color: var(--dim); font-family: 'Space Grotesk', monospace; font-size: 11px; min-width: 14px; }
    .asrc a { color: var(--muted); text-decoration: none; } .asrc a:hover { color: #C084FC; }
    .thinking { color: var(--muted); font-size: 14px; }
    .thinking::after { content: ' ·'; animation: blink 1s steps(3) infinite; }
    @keyframes blink { 0% { opacity: .2; } 50% { opacity: 1; } 100% { opacity: .2; } }
    .ask-err { color: #FCA5A5; font-size: 14px; }

    .src-list { padding: 6px; display: flex; flex-direction: column; }
    .src-row { display: flex; flex-direction: column; gap: 2px; padding: 12px 14px; border-radius: 12px; text-decoration: none; transition: background .12s; }
    a.src-row:hover { background: rgba(192,132,252,.08); }
    .src-row + .src-row { border-top: 1px solid var(--border); }
    .src-t { color: var(--text); font-size: 14.5px; line-height: 1.4; }
    .src-m { color: var(--muted); font-size: 12px; }
  </style>
